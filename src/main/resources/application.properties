spring.application.name=nurtricenter-appointment


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nurtricenter_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/group3realm}

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.whitelabel.enabled=true

# Event bus (Outbox + RabbitMQ)
eventbus.driver=${EVENTBUS_DRIVER:rabbitmq}

rabbitmq.host=${RABBITMQ_HOST:localhost}
rabbitmq.port=${RABBITMQ_PORT:5672}
rabbitmq.username=${RABBITMQ_USER:admin}
rabbitmq.password=${RABBITMQ_PASSWORD:rabbit_mq}
rabbitmq.vhost=${RABBITMQ_VHOST:/}
rabbitmq.exchange=${RABBITMQ_EXCHANGE:citas-evaluaciones.events}
rabbitmq.exchange-type=${RABBITMQ_EXCHANGE_TYPE:topic}
rabbitmq.exchange-durable=${RABBITMQ_EXCHANGE_DURABLE:true}
rabbitmq.routing-key=${RABBITMQ_ROUTING_KEY:citas-evaluaciones.events}
rabbitmq.queue=${RABBITMQ_QUEUE:citas-evaluaciones.cita.agendada,citas-evaluaciones.cita.atendida,citas-evaluaciones.nutricionista.creado,citas-evaluaciones.nutricionista.actualizado,citas-evaluaciones.nutricionista.deshabilitado}
rabbitmq.queue-durable=${RABBITMQ_QUEUE_DURABLE:true}
rabbitmq.queue-exclusive=${RABBITMQ_QUEUE_EXCLUSIVE:false}
rabbitmq.queue-auto-delete=${RABBITMQ_QUEUE_AUTO_DELETE:false}
rabbitmq.binding-key=${RABBITMQ_BINDING_KEY:}
rabbitmq.publish-retries=${RABBITMQ_PUBLISH_RETRIES:3}
rabbitmq.publish-backoff-ms=${RABBITMQ_PUBLISH_BACKOFF_MS:250}
rabbitmq.connect-timeout-seconds=${RABBITMQ_CONNECT_TIMEOUT:3}
rabbitmq.read-write-timeout-seconds=${RABBITMQ_READ_WRITE_TIMEOUT:3}
rabbitmq.outbox-batch-size=${RABBITMQ_OUTBOX_BATCH_SIZE:50}
rabbitmq.outbox-poll-interval-ms=${RABBITMQ_OUTBOX_POLL_INTERVAL_MS:1000}

# Reduce noisy RabbitMQ connection logs
logging.level.org.springframework.amqp.rabbit.connection.CachingConnectionFactory=WARN


# Inbound subscription/contract events
inbound.rabbitmq.enabled=${INBOUND_RABBITMQ_ENABLED:true}
inbound.rabbitmq.exchange=${INBOUND_RABBITMQ_EXCHANGE:outbox.events}
inbound.rabbitmq.exchange-type=${INBOUND_RABBITMQ_EXCHANGE_TYPE:topic}
inbound.rabbitmq.exchange-durable=${INBOUND_RABBITMQ_EXCHANGE_DURABLE:true}
inbound.rabbitmq.queue=${INBOUND_RABBITMQ_QUEUE:citas-evaluaciones.inbound}
inbound.rabbitmq.queue-durable=${INBOUND_RABBITMQ_QUEUE_DURABLE:true}
inbound.rabbitmq.queue-exclusive=${INBOUND_RABBITMQ_QUEUE_EXCLUSIVE:false}
inbound.rabbitmq.queue-auto-delete=${INBOUND_RABBITMQ_QUEUE_AUTO_DELETE:false}
inbound.rabbitmq.routing-keys=${INBOUND_RABBITMQ_ROUTING_KEYS:paciente.paciente-creado}

logging.level.org.springframework.amqp=DEBUG
logging.level.org.springframework.rabbit=DEBUG

# Actuator & Prometheus
management.endpoints.web.exposure.include=*
management.endpoints.access.default=unrestricted
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Spring Cloud Consul Service Discovery
spring.cloud.consul.host=${CONSUL_HOST:207.180.197.169}
spring.cloud.consul.port=${CONSUL_PORT:8500}
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.deregister=true
spring.cloud.consul.discovery.prefer-ip-address=true
spring.cloud.consul.discovery.ip-address=${HOST_IP:localhost}
spring.cloud.consul.discovery.register-health-check=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
spring.cloud.consul.discovery.health-check-timeout=5s

# Deshabilitar verificador de compatibilidad (Spring Boot 3.5.6 no es compatible oficialmente con Spring Cloud 2023.0.x)
spring.cloud.compatibility-verifier.enabled=false
