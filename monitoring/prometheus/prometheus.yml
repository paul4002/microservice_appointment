global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'citas-evaluaciones'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['citas-evaluaciones:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'citas-evaluaciones'
